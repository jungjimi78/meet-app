<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>My Swimmers</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="My Swimmers" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop stop-color='%23082f49'/%3E%3Cstop offset='0.55' stop-color='%230ea5e9'/%3E%3Cstop offset='1' stop-color='%237dd3fc'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='url(%23g)'/%3E%3Cpath d='M38 108c18-12 36-12 54 0s36 12 54 0 36-12 54 0' fill='none' stroke='rgba(255,255,255,.35)' stroke-width='10' stroke-linecap='round'/%3E%3Ccircle cx='92' cy='48' r='10' fill='white'/%3E%3Cpath d='M60 92l26-18 18 9 24-28' fill='none' stroke='white' stroke-width='10' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop stop-color='%23082f49'/%3E%3Cstop offset='0.55' stop-color='%230ea5e9'/%3E%3Cstop offset='1' stop-color='%237dd3fc'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='url(%23g)'/%3E%3Cpath d='M38 108c18-12 36-12 54 0s36 12 54 0 36-12 54 0' fill='none' stroke='rgba(255,255,255,.35)' stroke-width='10' stroke-linecap='round'/%3E%3Ccircle cx='92' cy='48' r='10' fill='white'/%3E%3Cpath d='M60 92l26-18 18 9 24-28' fill='none' stroke='white' stroke-width='10' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<style>
:root{
--bg:#eef9ff;
--card:#ffffff;
--blue:#0ea5e9;
--deep:#082f49;
--line:#dbeafe;
--text:#0f172a;
--muted:#64748b;
}
*{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:linear-gradient(180deg,#e0f2fe,#f8fdff);
color:var(--text);
padding-bottom:100px;
}
.app{
max-width:560px;
margin:0 auto;
padding:18px;
}
h1{
margin:6px 0;
font-size:32px;
}
.subtitle{
font-size:14px;
color:var(--muted);
}
.wave-card{
padding:18px;
border-radius:28px;
background:linear-gradient(135deg,#082f49,#0ea5e9);
color:white;
margin:14px 0;
}
.big-stat{
display:flex;
gap:10px;
margin-top:14px;
}
.stat-box{
flex:1;
background:rgba(255,255,255,.16);
padding:8px;
border-radius:18px;
}
.stat-box strong{
display:block;
font-size:24px;
}
.tabs{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:14px;
}
.swimmer-tab{
border:0;
padding:14px;
border-radius:20px;
font-size:16px;
font-weight:800;
background:white;
}
.swimmer-tab.active{
background:var(--deep);
color:white;
}
.card{
background:white;
border-radius:24px;
padding:16px;
margin-bottom:16px;
border:1px solid var(--line);
}
.section-title{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}
.pill-row{
display:flex;
gap:8px;
margin-bottom:12px;
}
.pill{
border:1px solid var(--line);
background:white;
padding:9px 12px;
border-radius:999px;
font-weight:700;
}
.pill.active{
background:var(--blue);
color:white;
}
table{
width:100%;
border-collapse:collapse;
min-width:100%;
}
th{
background:var(--deep);
color:white;
padding:8px;
font-size:12px;
}
td{
padding:8px;
border-bottom:1px solid #e2e8f0;
font-size:12px;
text-align:center;
}
.event-name{
font-weight:800;
text-align:left;
background:#f8fafc;
}
.pb-cell{
background:#fef9c3;
font-weight:900;
font-size:16px;
color:var(--deep);
}
.good{
background:#dcfce7;
}
.close{
background:#fef3c7;
}
.form-grid{
display:flex;
flex-direction:column;
gap:12px;
}
input,select,textarea{
width:100%;
padding:13px;
border-radius:14px;
border:1px solid var(--line);
font-size:16px;
}
.primary-btn{
width:100%;
border:0;
padding:14px;
border-radius:18px;
background:linear-gradient(135deg,#0284c7,#06b6d4);
color:white;
font-weight:900;
margin-top:14px;
}
.secondary-btn{
border:0;
padding:8px 10px;
border-radius:999px;
background:#e0f2fe;
font-weight:800;
color:var(--deep);
}
.bottom-nav{
position:fixed;
left:50%;
transform:translateX(-50%);
bottom:12px;
width:min(520px,calc(100% - 24px));
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:8px;
border-radius:22px;
background:rgba(255,255,255,.95);
border:1px solid #dbeafe;
}
.nav-btn{
border:0;
padding:12px 6px;
background:transparent;
border-radius:14px;
font-weight:800;
}
.nav-btn.active{
background:#e0f2fe;
color:var(--deep);
}
.hidden{display:none}
.event-chip{
display:inline-flex;
align-items:center;
gap:6px;
padding:8px 10px;
background:#e0f2fe;
border-radius:999px;
font-size:12px;
font-weight:800;
margin:4px;
}
</style>
</head>
<body>
<div class="app">
<header>
<div style="font-size:12px;font-weight:800;color:#0369a1">My Swimmers</div>
<h1>My Swimmers</h1>
<div class="subtitle">수영 기록 · CUT · 시즌 비교</div>
</header>

<section class="wave-card">
<div>현재 선택 선수</div>
<h2 id="heroName">Bomin</h2>
<div class="big-stat">
<div class="stat-box"><strong id="totalRecords">0</strong><span>Records</span></div>
<div class="stat-box"><strong id="pbCount">0</strong><span>PB Events</span></div>
<div class="stat-box"><strong id="eventCount">0</strong><span>Events</span></div>
</div>
</section>

<div class="tabs">
<button class="swimmer-tab active" data-swimmer="Bomin">Bomin</button>
<button class="swimmer-tab" data-swimmer="Jayha">Jayha</button>
</div>

<main id="screen-dashboard">
<section class="card">
<div class="section-title">
<h3>Time Standards</h3>
<span style="font-size:12px;color:#64748b">최고 기록 자동 반영</span>
</div>
<div class="pill-row">
<button class="pill" id="courseLCM">LONG</button>
<button class="pill active" id="courseSCY">SHORT</button>
</div>
<div style="overflow-x:auto;">
<table id="standardsTable"></table>
</div>
</section>
</main>

<main id="screen-add" class="hidden">
<section class="card">
<h3>기록 추가</h3>
<div class="form-grid">
<input id="date" type="date">
<select id="course">
<option value="LCM">LCM</option>
<option value="SCY">SCY</option>
</select>
<input id="meet" placeholder="Meet 이름">
<select id="event"></select>
<input id="time" placeholder="1:01.86">
<textarea id="note" placeholder="메모"></textarea>
</div>
<button class="primary-btn" id="saveRecordBtn">기록 저장</button>
</section>
</main>

<main id="screen-cuts" class="hidden">
<section class="card">
<h3>CUT 수정</h3>
<div class="form-grid">
<select id="cutEventSelect"></select>
<select id="cutCourseSelect">
<option value="LCM">LCM</option>
<option value="SCY">SCY</option>
</select>
<input id="futureCut" placeholder="FUTURE">
<input id="sectionalCut" placeholder="SECTIONAL">
<input id="eliteCut" placeholder="ELITE">
<input id="jagCut" placeholder="JAG">
</div>
<button class="primary-btn" id="saveCutsBtn">CUT 저장</button>

<div style="margin-top:18px;padding-top:18px;border-top:1px solid #dbeafe;">
<input id="newEventInput" placeholder="새 종목 추가">
<button class="primary-btn" id="addEventBtn">종목 ADD</button>
<div id="eventEditList"></div>
</div>
</section>
</main>

<main id="screen-meets" class="hidden">
<section class="card">
<h3>Meet Planner</h3>
<div class="form-grid">
<input id="meetPlanDate" type="date">
<input id="meetPlanName" placeholder="Meet 이름">
<textarea id="meetPlanNote" placeholder="전략 메모"></textarea>
</div>
<button class="primary-btn">저장 예정</button>
</section>
</main>
</div>

<nav class="bottom-nav">
<button class="nav-btn active" data-screen="dashboard">기록</button>
<button class="nav-btn" data-screen="add">추가</button>
<button class="nav-btn" data-screen="cuts">CUT</button>
<button class="nav-btn" data-screen="meets">Meet</button>
</nav>

<script>
const STORAGE_KEY='my-swimmers-final';

let events=JSON.parse(localStorage.getItem('my-swimmers-events')||'["50 Free","100 Free","200 Free","50 Back","100 Back","200 Back"]');

const cutProfiles={
Bomin:['SECTIONAL','FUTURE'],
Jayha:['ELITE','JAG']
};

let currentSwimmer='Bomin';
let currentCourse='SCY';

const data=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{"records":[],"cuts":{}}');

function saveData(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function timeToSeconds(t){
if(!t)return null;
if(String(t).includes(':')){
const p=String(t).split(':');
return Number(p[0])*60+Number(p[1]);
}
return Number(t);
}

function secondsToTime(sec){
if(sec==null||isNaN(sec))return '-';
if(sec>=60){
const m=Math.floor(sec/60);
const s=(sec-m*60).toFixed(2).padStart(5,'0');
return `${m}:${s}`;
}
return Number(sec).toFixed(2);
}

function getPB(eventName,course){
const recs=data.records.filter(r=>r.swimmer===currentSwimmer&&r.event===eventName&&r.course===course);
if(!recs.length)return null;
return Math.min(...recs.map(r=>timeToSeconds(r.time)));
}

function refreshDropdowns(){
const event=document.getElementById('event');
const cut=document.getElementById('cutEventSelect');

event.innerHTML=events.map(e=>`<option>${e}</option>`).join('');
cut.innerHTML=events.map(e=>`<option>${e}</option>`).join('');

const box=document.getElementById('eventEditList');
box.innerHTML=events.map(e=>`<div class="event-chip">${e}<button onclick="removeEvent('${e}')" style="border:0;background:none;color:red;font-weight:900;">✕</button></div>`).join('');
}

function renderTable(){
const swimmerRecords=data.records.filter(r=>r.swimmer===currentSwimmer);

if(currentCourse==='LCM' && !swimmerRecords.some(r=>r.course==='LCM') && swimmerRecords.some(r=>r.course==='SCY')){
currentCourse='SCY';
}

if(currentCourse==='SCY' && !swimmerRecords.some(r=>r.course==='SCY') && swimmerRecords.some(r=>r.course==='LCM')){
currentCourse='LCM';
}
const table=document.getElementById('standardsTable');
const standards=cutProfiles[currentSwimmer];

let html='<thead><tr>';
html+=`<th>${currentCourse}</th>`;
standards.forEach(s=>html+=`<th>${s}</th>`);
html+=`<th>${currentSwimmer}</th>`;
html+='</tr></thead><tbody>';

for(const ev of events){
html+='<tr>';
html+=`<td class="event-name">${ev}</td>`;

for(const s of standards){
const key=`${ev}-${currentCourse}`;
const cut=data.cuts[key]?.[s]||'-';
const pb=getPB(ev,currentCourse);
let diff='-';
let cls='';

if(cut!=='-'&&pb){
const gap=timeToSeconds(pb)-timeToSeconds(cut);
if(gap<=0){diff='✓';cls='good'}
else{diff=gap.toFixed(2);cls='close'}
}

html+=`<td class="${cls}">${cut}<div style="font-size:11px;margin-top:4px;color:#64748b">${diff}</div></td>`;
}

const pb=getPB(ev,currentCourse);
html+=`<td class="pb-cell">${pb?secondsToTime(pb):'-'}</td>`;
html+='</tr>';
}

html+='</tbody>';
table.innerHTML=html;
}

function renderStats(){
const recs=data.records.filter(r=>r.swimmer===currentSwimmer);
document.getElementById('heroName').textContent=currentSwimmer;
document.getElementById('totalRecords').textContent=recs.length;
document.getElementById('pbCount').textContent=new Set(recs.map(r=>r.event)).size;
document.getElementById('eventCount').textContent=events.length;

document.querySelectorAll('.swimmer-tab').forEach(btn=>{
btn.classList.toggle('active',btn.dataset.swimmer===currentSwimmer);
});
}

function renderAll(){
renderStats();
renderTable();
refreshDropdowns();
}

function switchScreen(name){
document.querySelectorAll('main').forEach(m=>m.classList.add('hidden'));
document.getElementById('screen-'+name).classList.remove('hidden');

document.querySelectorAll('.nav-btn').forEach(btn=>{
btn.classList.toggle('active',btn.dataset.screen===name);
});
}

function saveCuts(){
const ev=document.getElementById('cutEventSelect').value;
const course=document.getElementById('cutCourseSelect').value;
const key=`${ev}-${course}`;

if(!data.cuts[key])data.cuts[key]={};

data.cuts[key].FUTURE=document.getElementById('futureCut').value;
data.cuts[key].SECTIONAL=document.getElementById('sectionalCut').value;
data.cuts[key].ELITE=document.getElementById('eliteCut').value;
data.cuts[key].JAG=document.getElementById('jagCut').value;

saveData();
renderTable();
alert('CUT 저장 완료');
}

// 새 기록 추가 시 각 종목 최고기록(PB)은 자동으로 첫 화면 표에 반영됨
function addRecord(){
const record={
swimmer:currentSwimmer,
date:document.getElementById('date').value,
course:document.getElementById('course').value,
meet:document.getElementById('meet').value,
event:document.getElementById('event').value,
time:document.getElementById('time').value,
note:document.getElementById('note').value
};

if(!record.time)return;

data.records.push(record);
saveData();
renderAll();
switchScreen('dashboard');
}

function addEvent(){
const input=document.getElementById('newEventInput');
const value=input.value.trim();
if(!value)return;
if(events.includes(value))return;

events.push(value);
localStorage.setItem('my-swimmers-events',JSON.stringify(events));
input.value='';
renderAll();
}

function removeEvent(name){
events=events.filter(e=>e!==name);
localStorage.setItem('my-swimmers-events',JSON.stringify(events));
renderAll();
}

window.addEventListener('DOMContentLoaded',()=>{
document.getElementById('date').value=new Date().toISOString().slice(0,10);

document.querySelectorAll('.swimmer-tab').forEach(btn=>{
btn.addEventListener('click',()=>{
currentSwimmer=btn.dataset.swimmer;
renderAll();
});
});

document.getElementById('courseLCM').addEventListener('click',()=>{
currentCourse='LCM';
document.getElementById('courseLCM').classList.add('active');
document.getElementById('courseSCY').classList.remove('active');
renderTable();
});

document.getElementById('courseSCY').addEventListener('click',()=>{
currentCourse='SCY';
document.getElementById('courseSCY').classList.add('active');
document.getElementById('courseLCM').classList.remove('active');
renderTable();
});

document.querySelectorAll('.nav-btn').forEach(btn=>{
btn.addEventListener('click',()=>switchScreen(btn.dataset.screen));
});

document.getElementById('saveRecordBtn').addEventListener('click',addRecord);
document.getElementById('saveCutsBtn').addEventListener('click',saveCuts);
document.getElementById('addEventBtn').addEventListener('click',addEvent);

renderAll();
switchScreen('dashboard');
});
</script>
</body>
</html>
